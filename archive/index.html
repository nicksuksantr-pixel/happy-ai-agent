<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Maintenance Report</title>
    
    <!--
        Frontend Dev - UI/UX Engineer
        -----------------------------
        This file serves as a high-fidelity, interactive UI mockup for the technician-facing data entry form.
        While the project architecture specifies using Microsoft Forms for the final implementation,
        this prototype establishes a clear design vision, demonstrating a modern, accessible, and mobile-first interface.
        It can be used as a design guide for configuring the MS Form or as a blueprint for a future custom web app.
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Colors */
            --color-primary: #0078D4; /* A familiar, trusted blue */
            --color-primary-light: #e6f2fc;
            --color-success: #107C10;
            --color-success-light: #e7f2e7;
            --color-danger: #d13438;
            --color-background: #f4f4f5; /* Light gray for a soft, clean canvas */
            --color-surface: #ffffff;
            --color-text-primary: #171717;
            --color-text-secondary: #525252;
            --color-border: #d4d4d8;
            --color-border-focus: var(--color-primary);

            /* Typography */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            
            /* Spacing */
            --spacing-unit: 8px;
            
            /* Shadows & Borders */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --border-radius-md: 8px;
            --border-radius-lg: 12px;
        }

        /* 1. Reset & Base Styles */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--color-background);
            color: var(--color-text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        main {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: calc(var(--spacing-unit) * 3);
        }

        /* 2. Container & Card Layout */
        .form-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--color-surface);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .form-header {
            text-align: center;
            padding: calc(var(--spacing-unit) * 4) calc(var(--spacing-unit) * 3);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: calc(var(--spacing-unit) * 1.5);
            background-color: var(--color-surface);
        }

        .header-icon {
            color: var(--color-primary);
            width: 32px;
            height: 32px;
        }

        .form-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.2;
        }

        #reportForm {
            padding: calc(var(--spacing-unit) * 4) calc(var(--spacing-unit) * 3);
            display: flex;
            flex-direction: column;
            gap: calc(var(--spacing-unit) * 3);
        }

        /* 3. Form Elements & Floating Labels */
        .form-group {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: calc(var(--spacing-unit) * 2) calc(var(--spacing-unit) * 1.5);
            font-family: inherit;
            font-size: 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius-md);
            background-color: var(--color-surface);
            color: var(--color-text-primary);
            transition: border-color 0.2s ease;
        }
        
        /* Use a placeholder to make :placeholder-shown work consistently */
        .form-input::placeholder {
            color: transparent;
        }

        .form-label {
            position: absolute;
            top: 50%;
            left: calc(var(--spacing-unit) * 1.5);
            transform: translateY(-50%);
            color: var(--color-text-secondary);
            background-color: var(--color-surface);
            padding: 0 calc(var(--spacing-unit) * 0.5);
            transition: all 0.2s ease-in-out;
            pointer-events: none; /* Let clicks pass through to the input */
            font-size: 1rem;
        }
        
        .form-input:focus,
        .form-input:not(:placeholder-shown) {
            outline: none;
            border-color: var(--color-border-focus);
        }
        
        .form-input.is-invalid {
            border-color: var(--color-danger);
        }

        /* The "float up" effect */
        .form-input:focus + .form-label,
        .form-input:not(:placeholder-shown) + .form-label {
            top: 0;
            font-size: 0.8rem;
            color: var(--color-border-focus);
        }
        
        .form-input.is-invalid:focus + .form-label,
        .form-input.is-invalid:not(:placeholder-shown) + .form-label {
            color: var(--color-danger);
        }

        /* For accessibility, show focus ring only on keyboard navigation */
        .form-input:focus-visible {
             box-shadow: 0 0 0 2px var(--color-primary-light);
        }

        textarea.form-input {
            min-height: 120px;
            resize: vertical;
        }

        /* 4. File Upload Area */
        .file-upload-group .file-label {
            display: block;
            margin-bottom: var(--spacing-unit);
            font-weight: 500;
            color: var(--color-text-secondary);
        }

        .file-drop-area {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: calc(var(--spacing-unit) * 4);
            border: 2px dashed var(--color-border);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            text-align: center;
        }

        .file-drop-area.is-invalid {
            border-color: var(--color-danger);
        }
        
        .file-drop-area.drag-over {
            border-color: var(--color-primary);
            background-color: var(--color-primary-light);
        }
        
        .file-input {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-msg {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .file-msg .icon {
            font-size: 1.5rem;
            display: block;
            margin-bottom: var(--spacing-unit);
        }
        
        #image-preview-container {
            margin-top: var(--spacing-unit);
            width: 100%;
            display: flex;
            justify-content: center;
        }
        
        #image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: var(--border-radius-md);
            object-fit: cover;
            display: none; /* Hidden by default */
        }
        
        /* 5. Submit Button */
        .submit-button {
            width: 100%;
            padding: calc(var(--spacing-unit) * 2) 0;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-surface);
            background-color: var(--color-primary);
            border: none;
            border-radius: var(--border-radius-md);
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--spacing-unit);
        }
        
        .submit-button:hover:not(:disabled) {
            background-color: #005a9e; /* Darker blue */
        }

        .submit-button:active:not(:disabled) {
            transform: scale(0.98);
        }

        .submit-button:focus-visible {
            outline: 2px solid var(--color-border-focus);
            outline-offset: 2px;
        }

        .submit-button:disabled {
            background-color: var(--color-border);
            cursor: not-allowed;
        }
        
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 6. Success Message */
        .success-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: calc(var(--spacing-unit) * 6) calc(var(--spacing-unit) * 4);
        }
        
        .success-icon {
            color: var(--color-success);
            width: 60px;
            height: 60px;
            margin-bottom: calc(var(--spacing-unit) * 2);
        }

        .success-message h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-unit);
        }
        
        .success-message p {
            color: var(--color-text-secondary);
            margin-bottom: calc(var(--spacing-unit) * 3);
            max-width: 350px;
        }

        .new-report-button {
            padding: var(--spacing-unit) calc(var(--spacing-unit) * 2);
            font-weight: 500;
            color: var(--color-primary);
            background-color: var(--color-primary-light);
            border: 1px solid var(--color-primary-light);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .new-report-button:hover {
            background-color: #d1e9fa;
            border-color: #a8d5f7;
        }

        /* 7. Responsive Design */
        @media (min-width: 640px) {
            main {
                align-items: center;
            }
        }

    </style>
</head>
<body>

    <main>
        <div class="form-container">
            <div class="form-header">
                <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14.5 2.553V1A1 1 0 0 0 13.5 0h-3a1 1 0 0 0-1 1v1.553A9.524 9.524 0 0 0 2.553 9.5H1a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h1.553a9.524 9.524 0 0 0 6.947 6.947V23a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1.553a9.524 9.524 0 0 0 6.947-6.947H23a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1h-1.553A9.524 9.524 0 0 0 14.5 2.553zM12 19.5a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z"/><path d="M12 7c-2.757 0-5 2.243-5 5s2.243 5 5 5 5-2.243 5-5-2.243-5-5-5zm-3 5.5h6v-1H9v1z"/>
                </svg>
                <h1>Battery Maintenance Report</h1>
            </div>

            <form id="reportForm" novalidate>
                <!-- Form fields from the design document -->
                <div class="form-group">
                    <input type="text" id="siteName" class="form-input" placeholder="Site Name" required>
                    <label for="siteName" class="form-label">Site Name</label>
                </div>

                <div class="form-group">
                    <input type="text" id="technicianName" class="form-input" placeholder="Technician Name" required>
                    <label for="technicianName" class="form-label">Technician Name</label>
                </div>
                
                <div class="form-group">
                    <input type="date" id="dateOfService" class="form-input" placeholder="Date of Service" required>
                    <label for="dateOfService" class="form-label">Date of Service</label>
                </div>
                
                <div class="form-group">
                    <input type="text" id="batteryId" class="form-input" placeholder="Battery ID" required>
                    <label for="batteryId" class="form-label">Battery ID</label>
                </div>
                
                <div class="form-group">
                    <textarea id="observations" class="form-input" placeholder="Observations" rows="4"></textarea>
                    <label for="observations" class="form-label">Observations</label>
                </div>

                <!-- Custom File Upload -->
                <div class="file-upload-group">
                    <label for="sitePhoto" class="file-label">Site Photo</label>
                    <div class="file-drop-area">
                        <span class="file-msg">
                            <span class="icon" aria-hidden="true">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            </span>
                            Click to upload or drag & drop
                        </span>
                        <input type="file" id="sitePhoto" class="file-input" accept="image/*" required>
                    </div>
                    <div id="image-preview-container">
                        <img id="image-preview" src="#" alt="Image preview">
                    </div>
                </div>

                <button type="submit" class="submit-button" id="submitBtn">
                    <span id="submitBtnText">Submit Report</span>
                    <div id="loader" class="loader" style="display: none;"></div>
                </button>
            </form>

            <div id="successMessage" style="display: none;">
                <div class="success-message">
                    <svg class="success-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0a12 12 0 1 0 12 12A12.013 12.013 0 0 0 12 0zm5.707 8.707-6 6a1 1 0 0 1-1.414 0l-3-3a1 1 0 0 1 1.414-1.414L10 12.586l5.293-5.293a1 1 0 0 1 1.414 1.414z"/></svg>
                    <h2>Report Submitted</h2>
                    <p>Your maintenance report has been successfully recorded and sent for processing.</p>
                    <button id="newReportBtn" class="new-report-button">File Another Report</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('reportForm');
            const submitBtn = document.getElementById('submitBtn');
            const submitBtnText = document.getElementById('submitBtnText');
            const loader = document.getElementById('loader');
            const successMessage = document.getElementById('successMessage');
            const newReportBtn = document.getElementById('newReportBtn');
            const dateInput = document.getElementById('dateOfService');
            
            // --- File Upload Elements ---
            const fileInput = document.getElementById('sitePhoto');
            const dropArea = document.querySelector('.file-drop-area');
            const fileMsg = document.querySelector('.file-msg');
            const imagePreview = document.getElementById('image-preview');

            // --- Helper Functions ---
            const getTodayDateString = () => new Date().toISOString().slice(0, 10);
            
            const clearValidationStyles = () => {
                form.querySelectorAll('.is-invalid').forEach(el => {
                    el.classList.remove('is-invalid');
                });
            };

            // --- File Upload Logic ---
            const handleFile = (file) => {
                if (!file.type.startsWith('image/')) {
                    fileMsg.textContent = 'Error: Please upload an image file.';
                    imagePreview.style.display = 'none';
                    return;
                }
                
                fileMsg.textContent = file.name;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            };

            const preventDefaults = (e) => {
                e.preventDefault();
                e.stopPropagation();
            };

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
            });

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, preventDefaults, false);
            });
            
            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, () => dropArea.classList.add('drag-over'), false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, () => dropArea.classList.remove('drag-over'), false);
            });

            dropArea.addEventListener('drop', (e) => {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    fileInput.files = files; // Important for form submission
                    handleFile(files[0]);
                }
            }, false);

            // --- Form Initialization ---
            const initializeForm = () => {
                form.reset();
                clearValidationStyles();
                dateInput.value = getTodayDateString();
                
                // Reset UI elements to initial state
                successMessage.style.display = 'none';
                form.style.display = 'flex';
                
                submitBtn.disabled = false;
                submitBtnText.style.display = 'inline';
                loader.style.display = 'none';
                
                imagePreview.style.display = 'none';
                imagePreview.src = '#';
                fileMsg.innerHTML = `<span class="icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </span> Click to upload or drag & drop`;
            };

            // --- Form Submission Simulation ---
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                clearValidationStyles();

                let isValid = true;
                form.querySelectorAll('[required]').forEach(input => {
                    if ((input.type !== 'file' && !input.value) || (input.type === 'file' && input.files.length === 0)) {
                        isValid = false;
                        const target = input.type === 'file' ? dropArea : input;
                        target.classList.add('is-invalid');
                    }
                });

                if (!isValid) return;

                // Show loading state
                submitBtn.disabled = true;
                submitBtnText.style.display = 'none';
                loader.style.display = 'block';

                // Simulate network request
                setTimeout(() => {
                    form.style.display = 'none';
                    successMessage.style.display = 'block';
                }, 1500);
            });

            // --- Reset Form ---
            newReportBtn.addEventListener('click', initializeForm);

            // --- Initial Load ---
            initializeForm();
        });
    </script>

</body>
</html>
